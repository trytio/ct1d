# ═══════════════════════════════════════════════════════════════════════
# CT1D — AI-Powered Type 1 Diabetes Research Explorer
# Carlos Deployment — Base Configuration
# ═══════════════════════════════════════════════════════════════════════
#
# Architecture:
#   ┌──────────────┐
#   │   web ×2     │  ← Next.js app (frontend + API routes)
#   │   spread     │     Serves UI + handles AI chat + PubMed/ClinicalTrials proxy
#   │   LB:23000   │     VRE-aware load balancer
#   └──────┬───────┘
#          │
#   ┌──────┴───────┐     ┌──────────────┐
#   │  agent ×1    │────▶│   db ×1      │
#   │  spread      │     │   spread     │
#   │  +cron       │     │  PostgreSQL  │
#   └──────────────┘     │  VRE volume  │
#                        └──────────────┘
#
# External dependencies:
#   - OpenAI API (GPT-4o) — for AI chat + autonomous research
#   - PubMed E-utilities API — for live research search
#   - ClinicalTrials.gov API v2 — for clinical trials data
#
# Secrets required:
#   - openai_api_key / codex_auth_token — OpenAI authentication
#   - autonomous_secret — Auth token for autonomous agent cron triggers
#   - db_password — PostgreSQL password
#
# Usage:
#   carlos submit deploy/base/ct1d.yaml -a <server>
#
# ═══════════════════════════════════════════════════════════════════════

name: ct1d
job_type: service
namespace: default

update:
  max_parallel: 1
  stagger_secs: 30
  health_deadline_secs: 180
  on_failure: rollback
  auto_revert: true
  canary: 0

groups:
  # ── DATABASE TIER ─────────────────────────────────────────────────────
  # PostgreSQL 16 with VRE-replicated data volume.
  # All research data persists here: hypotheses, evidence, sessions, papers.
  - name: db
    count: 1
    strategy: spread

    restart:
      mode: on-failure
      max_attempts: 5
      delay_secs: 15

    volumes:
      - name: pgdata
        volume_type: replicated
        source: /data/ct1d/pgdata
        replication:
          replicas: 3
          sync_interval_secs: 30
          quorum: strong

    tasks:
      - name: postgres
        driver: docker
        image: "postgres:16-alpine"
        ports:
          - label: db
            container: 5432
            host: 5432
        resources:
          cpu: 300
          memory: 512
        health_check:
          type: script
          command: ["pg_isready", "-U", "ct1d"]
          interval_secs: 10
          timeout_secs: 5
          unhealthy_threshold: 3
          healthy_threshold: 2
          grace_period_secs: 30
        env:
          POSTGRES_DB: "ct1d"
          POSTGRES_USER: "ct1d"
          PGDATA: "/var/lib/postgresql/data/pgdata"
          CARLOS_OWNER: "ct1d-team"
          CARLOS_DESCRIPTION: "CT1D PostgreSQL — VRE replicated research database"
          CARLOS_SLA_UPTIME: "0.999"
        secrets:
          - db_password
        secret_env:
          POSTGRES_PASSWORD: db_password
        mounts:
          - volume: pgdata
            destination: /var/lib/postgresql/data
        load_balancer:
          port: 25432
          target: db
          vre_aware: true
          bind_address: "0.0.0.0"
        labels:
          tier: data
          tag.ct1d: "true"
          tag.database: "true"
          version: "16"

  # ── WEB TIER ─────────────────────────────────────────────────────────
  # Next.js app serving the frontend + API routes.
  # Handles: landing page, AI chat, cure landscape, research explorer,
  # clinical trials browser, timeline, papers viewer.
  - name: web
    count: 2
    strategy: spread

    restart:
      mode: on-failure
      max_attempts: 5
      delay_secs: 10

    tasks:
      - name: nextjs
        driver: docker
        image: "ct1d:latest"
        ports:
          - label: http
            container: 3000
            host: 0
        resources:
          cpu: 500
          memory: 512
        health_check:
          type: http
          path: /
          port_label: http
          interval_secs: 15
          timeout_secs: 10
          unhealthy_threshold: 3
          healthy_threshold: 2
          grace_period_secs: 30
        env:
          NODE_ENV: "production"
          DATABASE_URL: "postgresql://ct1d:${db_password}@postgres.db.ct1d:5432/ct1d"
          CARLOS_OWNER: "ct1d-team"
          CARLOS_DESCRIPTION: "CT1D web frontend and API"
          CARLOS_DEPENDS: "postgres.db.ct1d:required"
          CARLOS_SLA_UPTIME: "0.99"
          CARLOS_DOCS_URL: "https://github.com/trytio/ct1d"
        secrets:
          - openai_api_key
          - codex_auth_token
          - autonomous_secret
          - db_password
        load_balancer:
          port: 23000
          target: http
          vre_aware: true
          bind_address: "0.0.0.0"
        labels:
          tier: frontend
          tag.ct1d: "true"
          tag.ai: "true"
          version: "1.0.0"

  # ── AUTONOMOUS AGENT TIER ──────────────────────────────────────────
  # Same container but dedicated to running the autonomous research engine.
  # Uses cron-triggered API calls to /api/autonomous/research (every 30m)
  # and /api/autonomous/refresh (every 12h).
  # Connects to PostgreSQL for persistent research data.
  - name: agent
    count: 1
    strategy: spread

    restart:
      mode: on-failure
      max_attempts: 3
      delay_secs: 30

    tasks:
      - name: researcher
        driver: docker
        image: "ct1d:latest"
        ports:
          - label: http
            container: 3000
            host: 0
        resources:
          cpu: 300
          memory: 384
        health_check:
          type: http
          path: /api/autonomous/status
          port_label: http
          interval_secs: 30
          timeout_secs: 10
          unhealthy_threshold: 3
          healthy_threshold: 2
          grace_period_secs: 60
        env:
          NODE_ENV: "production"
          DATABASE_URL: "postgresql://ct1d:${db_password}@postgres.db.ct1d:5432/ct1d"
          CARLOS_OWNER: "ct1d-team"
          CARLOS_DESCRIPTION: "CT1D autonomous research agent"
          CARLOS_DEPENDS: "postgres.db.ct1d:required"
          CARLOS_SLA_UPTIME: "0.95"
        secrets:
          - openai_api_key
          - codex_auth_token
          - autonomous_secret
          - db_password
        labels:
          tier: backend
          tag.ct1d: "true"
          tag.autonomous: "true"
          tag.ai: "true"
          version: "1.0.0"

      # Cron sidecar — triggers research cycles and data refreshes
      - name: cron
        driver: docker
        image: "alpine:3.19"
        command:
          - /bin/sh
          - -c
          - |
            apk add --no-cache curl &&
            echo "*/30 * * * * curl -s -X POST -H 'Authorization: Bearer \$AUTONOMOUS_SECRET' http://localhost:3000/api/autonomous/research" > /etc/crontabs/root &&
            echo "0 */12 * * * curl -s -X POST -H 'Authorization: Bearer \$AUTONOMOUS_SECRET' http://localhost:3000/api/autonomous/refresh" >> /etc/crontabs/root &&
            crond -f -l 2
        resources:
          cpu: 50
          memory: 32
        env:
          CARLOS_DESCRIPTION: "Cron scheduler for autonomous research cycles"
        secrets:
          - autonomous_secret

# ── Placement Constraints ─────────────────────────────────────────────
constraints:
  - attribute: labels.env
    operator: "="
    value: production
