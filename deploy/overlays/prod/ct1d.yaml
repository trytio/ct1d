# CT1D — Production Overlay
# 3 web replicas, autoscaling, full resilience, VRE-replicated memory volume

groups:
  - name: web
    count: 3
    strategy: spread
    resilience:
      min_available: 2
      max_unavailable_pct: 30
      cascade_check: true
    scaling:
      min: 2
      max: 6
      metric: cpu
      target: 70
      cooldown: 30
    tasks:
      - name: nextjs
        image: "ct1d:latest"
        ports:
          - label: http
            container: 3000
            host: 0
        resources:
          cpu: 750
          memory: 768
        health_check:
          type: http
          path: /
          port_label: http
          interval_secs: 10
          timeout_secs: 5
          unhealthy_threshold: 3
          healthy_threshold: 2
          grace_period_secs: 30
        env:
          NODE_ENV: "production"
          CARLOS_SLA_UPTIME: "0.999"
        secrets:
          - openai_api_key
          - codex_auth_token
          - autonomous_secret
        load_balancer:
          port: 23000
          target: http
          vre_aware: true
          bind_address: "0.0.0.0"
        vpa:
          min_cpu: 300
          max_cpu: 1000
          min_memory: 256
          max_memory: 1024
          target_cpu: 70
          target_memory: 75
          cooldown: 60
        labels:
          tier: frontend
          tag.ct1d: "true"
          tag.ai: "true"
          environment: "production"
          version: "1.0.0"

  - name: agent
    count: 1
    strategy: binpack
    resilience:
      min_available: 0
    volumes:
      - name: ai-memory
        volume_type: replicated
        source: /data/ct1d/memory
        replication:
          replicas: 3
          sync_interval_secs: 30
          quorum: strong
    tasks:
      - name: researcher
        image: "ct1d:latest"
        ports:
          - label: http
            container: 3000
            host: 0
        resources:
          cpu: 500
          memory: 512
        health_check:
          type: http
          path: /api/autonomous/status
          port_label: http
          interval_secs: 30
          timeout_secs: 10
          unhealthy_threshold: 3
          healthy_threshold: 2
          grace_period_secs: 60
        env:
          NODE_ENV: "production"
          CARLOS_SLA_UPTIME: "0.99"
        secrets:
          - openai_api_key
          - codex_auth_token
          - autonomous_secret
        mounts:
          - volume: ai-memory
            destination: /app/src/data/memory
        labels:
          tier: backend
          tag.ct1d: "true"
          tag.autonomous: "true"
          tag.ai: "true"
          environment: "production"
          version: "1.0.0"

      - name: cron
        image: "alpine:3.19"
        command:
          - /bin/sh
          - -c
          - |
            apk add --no-cache curl &&
            echo "*/30 * * * * curl -s -X POST -H 'Authorization: Bearer \$AUTONOMOUS_SECRET' http://localhost:3000/api/autonomous/research" > /etc/crontabs/root &&
            echo "0 */12 * * * curl -s -X POST -H 'Authorization: Bearer \$AUTONOMOUS_SECRET' http://localhost:3000/api/autonomous/refresh" >> /etc/crontabs/root &&
            crond -f -l 2
        resources:
          cpu: 50
          memory: 32
        secrets:
          - autonomous_secret
