# CT1D — Production Overlay
# 3 web replicas, autoscaling, full resilience, VRE-replicated PostgreSQL

groups:
  # ── DATABASE ─────────────────────────────────────────────────────────
  - name: db
    count: 1
    strategy: spread
    resilience:
      min_available: 1
      cascade_check: true
    volumes:
      - name: pgdata
        volume_type: replicated
        source: /data/ct1d/pgdata
        replication:
          replicas: 3
          sync_interval_secs: 30
          quorum: strong
    tasks:
      - name: postgres
        image: "postgres:16-alpine"
        ports:
          - label: db
            container: 5432
            host: 5432
        resources:
          cpu: 500
          memory: 1024
        health_check:
          type: script
          command: ["pg_isready", "-U", "ct1d"]
          interval_secs: 10
          timeout_secs: 5
          unhealthy_threshold: 3
          healthy_threshold: 2
          grace_period_secs: 30
        env:
          POSTGRES_DB: "ct1d"
          POSTGRES_USER: "ct1d"
          PGDATA: "/var/lib/postgresql/data/pgdata"
          POSTGRES_INITDB_ARGS: "--data-checksums"
        secrets:
          - db_password
        secret_env:
          POSTGRES_PASSWORD: db_password
        mounts:
          - volume: pgdata
            destination: /var/lib/postgresql/data
        load_balancer:
          port: 25432
          target: db
          vre_aware: true
          bind_address: "0.0.0.0"
        vpa:
          min_cpu: 200
          max_cpu: 750
          min_memory: 512
          max_memory: 2048
          target_cpu: 70
          target_memory: 75
          cooldown: 60
        labels:
          tier: data
          tag.ct1d: "true"
          tag.database: "true"
          environment: "production"
          version: "16"

  # ── WEB ──────────────────────────────────────────────────────────────
  - name: web
    count: 3
    strategy: spread
    resilience:
      min_available: 2
      max_unavailable_pct: 30
      cascade_check: true
    scaling:
      min: 2
      max: 6
      metric: cpu
      target: 70
      cooldown: 30
    tasks:
      - name: nextjs
        image: "ct1d:latest"
        ports:
          - label: http
            container: 3000
            host: 0
        resources:
          cpu: 750
          memory: 768
        health_check:
          type: http
          path: /
          port_label: http
          interval_secs: 10
          timeout_secs: 5
          unhealthy_threshold: 3
          healthy_threshold: 2
          grace_period_secs: 30
        env:
          NODE_ENV: "production"
          DATABASE_URL: "postgresql://ct1d:${db_password}@postgres.db.ct1d:5432/ct1d"
          CARLOS_SLA_UPTIME: "0.999"
        secrets:
          - openai_api_key
          - codex_auth_token
          - autonomous_secret
          - db_password
        load_balancer:
          port: 23000
          target: http
          vre_aware: true
          bind_address: "0.0.0.0"
        vpa:
          min_cpu: 300
          max_cpu: 1000
          min_memory: 256
          max_memory: 1024
          target_cpu: 70
          target_memory: 75
          cooldown: 60
        labels:
          tier: frontend
          tag.ct1d: "true"
          tag.ai: "true"
          environment: "production"
          version: "1.0.0"

  # ── AGENT ────────────────────────────────────────────────────────────
  - name: agent
    count: 1
    strategy: spread
    resilience:
      min_available: 0
    tasks:
      - name: researcher
        image: "ct1d:latest"
        ports:
          - label: http
            container: 3000
            host: 0
        resources:
          cpu: 500
          memory: 512
        health_check:
          type: http
          path: /api/autonomous/status
          port_label: http
          interval_secs: 30
          timeout_secs: 10
          unhealthy_threshold: 3
          healthy_threshold: 2
          grace_period_secs: 60
        env:
          NODE_ENV: "production"
          DATABASE_URL: "postgresql://ct1d:${db_password}@postgres.db.ct1d:5432/ct1d"
          CARLOS_SLA_UPTIME: "0.99"
        secrets:
          - openai_api_key
          - codex_auth_token
          - autonomous_secret
          - db_password
        labels:
          tier: backend
          tag.ct1d: "true"
          tag.autonomous: "true"
          tag.ai: "true"
          environment: "production"
          version: "1.0.0"

      - name: cron
        image: "alpine:3.19"
        command:
          - /bin/sh
          - -c
          - |
            apk add --no-cache curl &&
            echo "*/30 * * * * curl -s -X POST -H 'Authorization: Bearer \$AUTONOMOUS_SECRET' http://localhost:3000/api/autonomous/research" > /etc/crontabs/root &&
            echo "0 */12 * * * curl -s -X POST -H 'Authorization: Bearer \$AUTONOMOUS_SECRET' http://localhost:3000/api/autonomous/refresh" >> /etc/crontabs/root &&
            crond -f -l 2
        resources:
          cpu: 50
          memory: 32
        secrets:
          - autonomous_secret
